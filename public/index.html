<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GPT Chatbot - AI Assistant powered by OpenRouter">
    <title>GPT Chatbot - AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- แถบด้านข้าง (Sidebar) -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <button id="btn-new-chat" class="btn-new-chat" aria-label="สร้างแชทใหม่">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>แชทใหม่</span>
            </button>
        </div>
        <nav class="sidebar-conversations" id="conversation-list" aria-label="รายการบทสนทนา">
            <!-- รายการบทสนทนาจะถูกเพิ่มผ่าน JavaScript -->
        </nav>
        <div class="sidebar-footer">
            <button id="btn-clear-all" class="btn-clear-all" aria-label="ลบบทสนทนาทั้งหมด">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span>ลบบทสนทนาทั้งหมด</span>
            </button>
        </div>
    </aside>

    <!-- พื้นที่เนื้อหาหลัก -->
    <main class="main-content">
        <!-- ส่วนหัว (Header) -->
        <header class="chat-header">
            <button id="btn-toggle-sidebar" class="btn-toggle-sidebar" aria-label="เปิด/ปิดแถบด้านข้าง">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="header-model-info">
                <h1 class="header-title">GPT Chatbot</h1>
                <span class="header-model-badge">GPT-5.2</span>
            </div>
        </header>

        <!-- พื้นที่แสดงข้อความ -->
        <div class="chat-area" id="chat-area">
            <!-- หน้าจอต้อนรับ (Welcome Screen) -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="1.5">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#8b5cf6" />
                                <stop offset="100%" style="stop-color:#06b6d4" />
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h2 class="welcome-title">สวัสดี! มีอะไรให้ช่วยไหม?</h2>
                <p class="welcome-subtitle">ฉันพร้อมตอบทุกคำถามของคุณ</p>
                <div class="welcome-suggestions">
                    <button class="suggestion-card" data-prompt="อธิบายเรื่อง Quantum Computing แบบเข้าใจง่ายๆ">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                        <span>อธิบายเรื่อง Quantum Computing แบบเข้าใจง่ายๆ</span>
                    </button>
                    <button class="suggestion-card" data-prompt="ช่วยเขียนฟังก์ชัน Python สำหรับ sort array">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        <span>ช่วยเขียนฟังก์ชัน Python สำหรับ sort array</span>
                    </button>
                    <button class="suggestion-card" data-prompt="แนะนำสถานที่ท่องเที่ยวในประเทศไทยที่น่าสนใจ">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span>แนะนำสถานที่ท่องเที่ยวในประเทศไทยที่น่าสนใจ</span>
                    </button>
                    <button class="suggestion-card" data-prompt="สรุปหลักการ SOLID ในการเขียนโปรแกรม">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        <span>สรุปหลักการ SOLID ในการเขียนโปรแกรม</span>
                    </button>
                </div>
            </div>

            <!-- คอนเทนเนอร์ข้อความ -->
            <div class="messages-container" id="messages-container">
                <!-- ข้อความจะถูกเพิ่มผ่าน JavaScript -->
            </div>
        </div>

        <!-- แถบพิมพ์ข้อความ (Input Area) -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="message-input"
                    class="message-input"
                    placeholder="พิมพ์ข้อความของคุณที่นี่..."
                    rows="1"
                    aria-label="กล่องพิมพ์ข้อความ"
                ></textarea>
                <button id="btn-send" class="btn-send" disabled aria-label="ส่งข้อความ">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <button id="btn-stop" class="btn-stop hidden" aria-label="หยุดการตอบ">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                    </svg>
                </button>
            </div>
            <p class="input-disclaimer">GPT Chatbot อาจให้ข้อมูลที่ไม่ถูกต้อง กรุณาตรวจสอบข้อเท็จจริงเพิ่มเติม</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
